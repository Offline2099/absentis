<div class="column">

  @if (book(); as book) {

    <div class="book-data-container">
      <img src="img/books/{{ book.id }}.webp" [alt]="book.title" />
      <div class="book-data">
        <table>
          <tr>
            <th>Автор</th>
            <td>{{ book.author }}</td>
          </tr>
          <tr>
            <th>Название</th>
            <td>{{ book.title }}</td>
          </tr>
          <tr>
            <th>ISBN</th>
            <td>{{ book.isbn }}</td>
          </tr>
        </table>
        <p>{{ book.description }}</p>
      </div>
    </div>

    <h2>
      <ng-container>Отдельные главы</ng-container>
      <div class="underline"></div>
    </h2>

    <div class="book-chapters">
      @for (chapter of book.chapters; track chapter.id) {
        <a class="chapter" [routerLink]="chapter.id" draggable="false">
          <img src="img/books/{{ book.id }}/{{ chapter.id }}.webp" alt="" />
          <div class="card-data">
            <div class="caption">{{ chapter.caption }}</div>
            <div>{{ chapter.title }}</div>
          </div>
        </a>
      }
    </div>
  }
  
</div>
