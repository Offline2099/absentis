<div class="column">
  <div class="parts">
    @if (material(); as material) {
      @for (part of material.parts; track part.id) {
        <a class="card-horizontal" [routerLink]="part.id" draggable="false">
          <img src="img/materials/{{ material.id }}/{{ part.id }}.webp" alt="" />
          <div class="card-data">
            <div>{{ part.title }}</div>
          </div>
        </a>
      }
    }
  </div>
</div>
